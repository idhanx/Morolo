services:

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - open-meta-data_app_net

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_SERVER_URL: "http://localhost:9000"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - open-meta-data_app_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    volumes:
      - ./backend:/workspace/backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@openmetadata_postgresql:5432/openmetadata_db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      STORAGE_BACKEND: minio
      OM_HOST: http://openmetadata_server:8585
      OM_TOKEN: ${OM_TOKEN}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-supersecretkey}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - open-meta-data_app_net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: worker
    command: ["celery", "-A", "backend.tasks.celery_app", "worker", "--loglevel=info"]
    volumes:
      - ./backend:/workspace/backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@openmetadata_postgresql:5432/openmetadata_db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      STORAGE_BACKEND: minio
      OM_HOST: http://openmetadata_server:8585
      OM_TOKEN: ${OM_TOKEN}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - open-meta-data_app_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_OM_UI_URL: http://localhost:8585
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - open-meta-data_app_net

networks:
  open-meta-data_app_net:
    name: app_net
    driver: bridge

volumes:
  redis_data:
  minio_data: